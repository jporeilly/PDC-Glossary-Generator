anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">DOMAIN PACK  (industry overlay)</text><text x="96" y="422" font-size="23" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">tags · categories · detection · verified references — e.g. water_utility example</text><rect x="60" y="460" width="1280" height="120" rx="14" fill="#EDF2F4" stroke="none" stroke-width="0"/><text x="96" y="510" font-size="26" fill="#1B262B" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">GENERIC CORE  (ships in code)</text><text x="96" y="552" font-size="23" fill="#5B6B73" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">PII / PCI / PHI concepts · deterministic sensitivity floor — never lowered</text><text x="1360" y="260" font-size="20" fill="#5B6B73" text-anchor="end" font-weight="400"  font-family="Arial, Helvetica, sans-serif">read</text><line x1="1355" y1="300" x2="1355.0" y2="464.0" stroke="#5B6B73" stroke-width="1.6"/><polygon points="1355.0,470.0 1352.5,464.0 1357.5,464.0" fill="#5B6B73"/><text x="60" y="640" font-size="24" fill="#5B6B73" text-anchor="start" font-weight="400" font-style="italic" font-family="Arial, Helvetica, sans-serif">classify() reads top-down; the core floor stays authoritative. Swap the pack for any sector — no code changes.</text></svg>