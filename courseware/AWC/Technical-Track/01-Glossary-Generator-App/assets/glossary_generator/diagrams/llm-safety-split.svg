<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" width="1400" height="700"><defs><marker id="a5B6B73" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L8,4 L1,7 Z" fill="#5B6B73"/></marker><marker id="a1C7293" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L8,4 L1,7 Z" fill="#1C7293"/></marker><marker id="a2EC4B6" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L8,4 L1,7 Z" fill="#2EC4B6"/></marker><marker id="a14333F" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L8,4 L1,7 Z" fill="#14333F"/></marker><marker id="a12A697" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L8,4 L1,7 Z" fill="#12A697"/></marker></defs><rect width="1400" height="700" fill="#FFFFFF"/><text x="60" y="64" font-size="24" fill="#1C7293" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">SAFE LLM ENRICHMENT</text><text x="60" y="112" font-size="40" fill="#14333F" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Enriched descriptions — prose from the model, links from a verified map</text><rect x="60" y="300" width="240" height="120" rx="14" fill="#14333F" stroke="none" stroke-width="0"/><text x="180" y="360" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Concept</text><text x="180" y="396" font-size="22" fill="#2EC4B6" text-anchor="middle" font-weight="400"  font-family="Arial, Helvetica, sans-serif">(term)</text><rect x="420" y="200" width="520" height="150" rx="14" fill="#EDF2F4" stroke="none" stroke-width="0"/><text x="452" y="250" font-size="24" fill="#1C7293" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">LLM  ·  writes PROSE</text><text x="452" y="292" font-size="22" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">1-2 plain sentences on what it is / why it matters.</text><text x="452" y="324" font-size="22" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">Told explicitly: do NOT invent citations or URLs.</text><rect x="420" y="380" width="520" height="150" rx="14" fill="#14333F" stroke="none" stroke-width="0"/><text x="452" y="430" font-size="24" fill="#2EC4B6" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">VERIFIED MAP  ·  supplies LINKS</text><text x="452" y="472" font-size="22" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">Curated {title, authority, url} from the domain pack.</text><text x="452" y="504" font-size="22" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">Human-verified. The model never mints these.</text><line x1="304" y1="330" x2="412.7" y2="272.8" stroke="#1C7293" stroke-width="1.6"/><polygon points="418.0,270.0 413.9,275.0 411.5,270.6" fill="#1C7293"/><line x1="304" y1="392" x2="412.7" y2="449.2" stroke="#2EC4B6" stroke-width="1.6"/><polygon points="418.0,452.0 411.5,451.4 413.9,447.0" fill="#2EC4B6"/><rect x="1010" y="300" width="330" height="150" rx="14" fill="#F2F7F8" stroke="#D8E2E6" stroke-width="2"/><text x="1175" y="352" font-size="26" fill="#14333F" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Description</text><text x="1175" y="392" font-size="22" fill="#5B6B73" text-anchor="middle" font-weight="400"  font-family="Arial, Helvetica, sans-serif">prose + verified links</text><line x1="944" y1="270" x2="1004.3" y2="347.3" stroke="#1C7293" stroke-width="1.6"/><polygon points="1008.0,352.0 1002.3,348.8 1006.3,345.7" fill="#1C7293"/><line x1="944" y1="452" x2="1003.4" y2="401.9" stroke="#2EC4B6" stroke-width="1.6"/><polygon points="1008.0,398.0 1005.0,403.8 1001.8,400.0" fill="#2EC4B6"/><text x="60" y="640" font-size="24" fill="#5B6B73" text-anchor="start" font-weight="400" font-style="italic" font-family="Arial, Helvetica, sans-serif">Same rule as the tag allow-list: the model proposes within a controlled vocabulary; it never mints authoritative facts.</text></svg>