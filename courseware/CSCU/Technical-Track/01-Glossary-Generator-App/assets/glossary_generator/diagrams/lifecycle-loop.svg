roke-width="0"/><text x="334.0" y="262" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Review</text><text x="334.0" y="292" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">(merge/keep)</text><line x1="420" y1="270" x2="432.0" y2="270.0" stroke="#5B6B73" stroke-width="1.6"/><polygon points="438.0,270.0 432.0,272.5 432.0,267.5" fill="#5B6B73"/><rect x="440" y="210" width="168" height="120" rx="14" fill="#1C7293" stroke="none" stroke-width="0"/><text x="524.0" y="262" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Export</text><text x="524.0" y="292" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">glossary</text><line x1="610" y1="270" x2="622.0" y2="270.0" stroke="#5B6B73" stroke-width="1.6"/><polygon points="628.0,270.0 622.0,272.5 622.0,267.5" fill="#5B6B73"/><rect x="630" y="210" width="168" height="120" rx="14" fill="#1C7293" stroke="none" stroke-width="0"/><text x="714.0" y="262" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Import → PDC</text><text x="714.0" y="292" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">mints ids</text><line x1="800" y1="270" x2="812.0" y2="270.0" stroke="#5B6B73" stroke-width="1.6"/><polygon points="818.0,270.0 812.0,272.5 812.0,267.5" fill="#5B6B73"/><rect x="820" y="210" width="168" height="120" rx="14" fill="#2EC4B6" stroke="none" stroke-width="0"/><text x="904.0" y="262" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Reconcile ids</text><text x="904.0" y="292" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">→ registry</text><line x1="990" y1="270" x2="1002.0" y2="270.0" stroke="#5B6B73" stroke-width="1.6"/><polygon points="1008.0,270.0 1002.0,272.5 1002.0,267.5" fill="#5B6B73"/><rect x="1010" y="210" width="168" height="120" rx="14" fill="#1C7293" stroke="none" stroke-width="0"/><text x="1094.0" y="262" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Emit &amp; deploy</text><text x="1094.0" y="292" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">methods</text><line x1="1180" y1="270" x2="1192.0" y2="270.0" stroke="#5B6B73" stroke-width="1.6"/><polygon points="1198.0,270.0 1192.0,272.5 1192.0,267.5" fill="#5B6B73"/><rect x="1200" y="210" width="168" height="120" rx="14" fill="#14333F" stroke="none" stroke-width="0"/><text x="1284.0" y="262" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">DRIFT</text><text x="1284.0" y="292" font-size="23" fill="#FFFFFF" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">CHECK</text><rect x="60" y="380" width="1308" height="86" rx="12" fill="#F2F7F8" stroke="#D8E2E6" stroke-width="2"/><text x="80" y="414" font-size="20" fill="#12A697" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">PERSISTENCE</text><text x="80" y="446" font-size="22" fill="#5B6B73" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">save_registry() on glossary save · load_registry() on open — reconciled ids, learned concepts &amp; references persist</text><line x1="904.0" y1="330" x2="904.0" y2="380" stroke="#12A697" stroke-width="3" stroke-dasharray="6 6"/><rect x="60" y="540" width="1308" height="150" rx="12" fill="#EDF2F4" stroke="none" stroke-width="0"/><text x="80" y="584" font-size="24" fill="#14333F" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Why drift is post-reconcile</text><text x="80" y="622" font-size="22" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">A dictionary method binds by dictionaryTermId — an id that only exists once the reviewed glossary is</text><text x="80" y="654" font-size="22" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">imported and its ids reconciled into the registry. Before that pivot it reads UNKNOWN. Pattern methods</text><text x="80" y="686" font-size="22" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">bind by category, so pattern drift shows a step earlier — but the full picture follows reconcile.</text></svg>