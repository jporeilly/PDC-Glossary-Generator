<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 860" width="1500" height="860"><defs><marker id="m5B6B73" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#5B6B73"/></marker><marker id="mB85042" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#B85042"/></marker><marker id="m12A697" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#12A697"/></marker><marker id="m2EC4B6" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#2EC4B6"/></marker><marker id="msub" markerWidth="9" markerHeight="9" refX="4.5" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L8,4 L1,7 Z" fill="#12A697"/></marker></defs><rect width="1500" height="860" fill="#FFFFFF"/><text x="60" y="64" font-size="24" fill="#1C7293" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">THE REGISTRY — WHAT IT SOLVES AND WHY</text><text x="60" y="112" font-size="38" fill="#14333F" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">One agreed answer for how each kind of data is classified</text><rect x="60" y="170" width="680" height="620" rx="18" fill="#F7ECEA" stroke="none" stroke-width="0"/><text x="96" y="220" font-size="22" fill="#B85042" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">THE CHALLENGE</text><text x="96" y="258" font-size="24" fill="#1B262B" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">The same facts, set by hand in 3 places</text><rect x="96" y="300" width="608" height="86" rx="12" fill="#FFFFFF" stroke="#D8E2E6" stroke-width="2"/><text x="120" y="338" font-size="23" fill="#14333F" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Data Identification method</text><text x="120" y="368" font-size="20" fill="#5B6B73" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">stamps tags on a match</text><rect x="96" y="410" width="608" height="86" rx="12" fill="#FFFFFF" stroke="#D8E2E6" stroke-width="2"/><text x="120" y="448" font-size="23" fill="#14333F" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Glossary term</text><text x="120" y="478" font-size="20" fill="#5B6B73" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">carries its own tags + definition</text><rect x="96" y="520" width="608" height="86" rx="12" fill="#FFFFFF" stroke="#D8E2E6" stroke-width="2"/><text x="120" y="558" font-size="23" fill="#14333F" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Steward's judgement</text><text x="120" y="588" font-size="20" fill="#5B6B73" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">decides sensitivity ad hoc</text><text x="96" y="650" font-size="22" fill="#1B262B" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Nothing forces them to agree — tags are free text. So:</text><text x="96" y="688" font-size="21" fill="#B85042" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Drift — glossary and method say different things over time</text><text x="96" y="720" font-size="21" fill="#B85042" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Wrong sensitivity — customer_id set LOW, not HIGH/PII</text><text x="96" y="752" font-size="21" fill="#B85042" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Inconsistent tags — "PII" / "pii" / "P2"; no compliance context</text><rect x="780" y="170" width="660" height="620" rx="18" fill="#E6F7F4" stroke="none" stroke-width="0"/><text x="816" y="220" font-size="22" fill="#12A697" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">THE GOAL</text><text x="816" y="258" font-size="24" fill="#1B262B" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Build one Registry — one row per concept</text><rect x="816" y="290" width="588" height="190" rx="12" fill="#14333F" stroke="none" stroke-width="0"/><text x="844" y="330" font-size="20" fill="#2EC4B6" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">REGISTRY ROW  (e.g. "Customer Id")</text><text x="844" y="372" font-size="21" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">business term  +  PDC term id</text><text x="844" y="404" font-size="21" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">governed tags (controlled list)</text><text x="844" y="436" font-size="21" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">sensitivity — decided by rule</text><text x="844" y="468" font-size="21" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">category  +  verified compliance links</text><text x="816" y="512" font-size="22" fill="#1B262B" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Everything downstream is generated from it:</text><rect x="816" y="558" width="180" height="64" rx="10" fill="#FFFFFF" stroke="#D8E2E6" stroke-width="2"/><text x="906" y="597" font-size="19" fill="#14333F" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Glossary term</text><rect x="1020" y="558" width="180" height="64" rx="10" fill="#FFFFFF" stroke="#D8E2E6" stroke-width="2"/><text x="1110" y="590" font-size="19" fill="#14333F" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">DI method</text><text x="1110" y="612" font-size="16" fill="#5B6B73" text-anchor="middle" font-weight="400"  font-family="Arial, Helvetica, sans-serif">(tags)</text><rect x="1224" y="558" width="180" height="64" rx="10" fill="#FFFFFF" stroke="#D8E2E6" stroke-width="2"/><text x="1314" y="597" font-size="19" fill="#14333F" text-anchor="middle" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Description</text><line x1="906" y1="532" x2="906.0" y2="548.0" stroke="#12A697" stroke-width="1.6"/><polygon points="906.0,554.0 903.5,548.0 908.5,548.0" fill="#12A697"/><line x1="1110" y1="532" x2="1110.0" y2="548.0" stroke="#12A697" stroke-width="1.6"/><polygon points="1110.0,554.0 1107.5,548.0 1112.5,548.0" fill="#12A697"/><line x1="1314" y1="532" x2="1314.0" y2="548.0" stroke="#12A697" stroke-width="1.6"/><polygon points="1314.0,554.0 1311.5,548.0 1316.5,548.0" fill="#12A697"/><text x="816" y="672" font-size="21" fill="#12A697" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• One source — the sides can't disagree</text><text x="816" y="704" font-size="21" fill="#12A697" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• customer_id is always HIGH/PII, by rule</text><text x="816" y="736" font-size="21" fill="#12A697" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• A linter catches any method that drifts</text><text x="60" y="838" font-size="18" fill="#5B6B73" text-anchor="start" font-weight="400" font-style="italic" font-family="Arial, Helvetica, sans-serif">For the steward &amp; analyst: the Registry is the one place we decide how each kind of data is classified — so every screen agrees.</text></svg>