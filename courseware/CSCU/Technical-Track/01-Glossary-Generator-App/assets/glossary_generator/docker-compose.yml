# Glossary Suggester — local container stack
#
#   docker compose up --build        # build + run -> http://localhost:5000
#   docker compose down              # stop (named volume 'glossary-data' persists)
#
# Ollama stays on the HOST (keeps GPU enrichment fast). The container reaches it via
# host.docker.internal. On Linux that name is provided by the extra_hosts mapping
# below; on Docker Desktop (macOS/Windows) it resolves automatically but the mapping
# is harmless.
services:
  glossary:
    build: .
    image: glossary-suggester
    ports:
      - "5000:5000"
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      LLM_MODEL: llama3.2:3b
      # GLOSSARY_COMPANY: "Your Organization"   # override to re-point the prompts
    extra_hosts:
      - "host.docker.internal:host-gateway"     # Linux hosts
    volumes:
      - glossary-data:/data                      # persists people/connections/settings/glossaries
      # - ./uploads:/uploads:ro                  # mount + set GLOSSARY_DDL=/uploads/... for DDL-file scans
    restart: unless-stopped

volumes:
  glossary-data:
