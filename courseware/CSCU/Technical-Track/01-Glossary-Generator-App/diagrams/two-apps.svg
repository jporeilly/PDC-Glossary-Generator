<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 820" width="1560" height="820"><defs><marker id="m5B6B73" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L8,4 L1,7 Z" fill="#5B6B73"/></marker><marker id="m1C7293" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L8,4 L1,7 Z" fill="#1C7293"/></marker><marker id="m12A697" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1 L8,4 L1,7 Z" fill="#12A697"/></marker></defs><rect width="1560" height="820" fill="#FFFFFF"/><text x="60" y="62" font-size="24" fill="#1C7293" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">TWO APPS, ONE HANDOFF</text><text x="60" y="110" font-size="38" fill="#14333F" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Glossary Generator first, then Policy Generator</text><rect x="50" y="180" width="470" height="470" rx="18" fill="#E7F0F3" stroke="none" stroke-width="0"/><text x="80" y="228" font-size="22" fill="#1C7293" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">1 · GLOSSARY GENERATOR</text><text x="80" y="264" font-size="22" fill="#1B262B" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Builds the business glossary</text><text x="80" y="304" font-size="21" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Scans sources, proposes concepts</text><text x="80" y="338" font-size="21" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Steward reviews (merge / keep)</text><text x="80" y="372" font-size="21" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Imports to PDC — term ids minted</text><text x="80" y="406" font-size="21" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Authors the Registry:</text><text x="80" y="440" font-size="21" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">   term · tags · sensitivity · references</text><rect x="80" y="500" width="410" height="58" rx="10" fill="#FFFFFF" stroke="#D8E2E6" stroke-width="2"/><text x="100" y="536" font-size="20" fill="#14333F" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">PDC area:  Business Glossary</text><text x="80" y="606" font-size="20" fill="#1C7293" text-anchor="start" font-weight="700" font-style="italic" font-family="Arial, Helvetica, sans-serif">Produces the Registry</text><rect x="560" y="250" width="440" height="330" rx="16" fill="#14333F" stroke="none" stroke-width="0"/><text x="585" y="296" font-size="26" fill="#2EC4B6" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">REGISTRY</text><text x="585" y="330" font-size="19" fill="#B8CED3" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">one row per concept</text><text x="585" y="368" font-size="20" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">business term  +  term id</text><text x="585" y="402" font-size="20" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">governed tags (allow-list)</text><text x="585" y="436" font-size="20" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">sensitivity floor</text><text x="585" y="470" font-size="20" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">category  ·  verified references</text><text x="585" y="504" font-size="20" fill="#FFFFFF" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">method spec (pattern / dictionary)</text><text x="585" y="556" font-size="18" fill="#2EC4B6" text-anchor="start" font-weight="400" font-style="italic" font-family="Arial, Helvetica, sans-serif">saved with the glossary · the handoff</text><line x1="522" y1="415" x2="552.0" y2="415.0" stroke="#1C7293" stroke-width="1.6"/><polygon points="558.0,415.0 552.0,417.5 552.0,412.5" fill="#1C7293"/><line x1="1002" y1="415" x2="1032.0" y2="415.0" stroke="#12A697" stroke-width="1.6"/><polygon points="1038.0,415.0 1032.0,417.5 1032.0,412.5" fill="#12A697"/><rect x="1040" y="180" width="470" height="470" rx="18" fill="#E6F7F4" stroke="none" stroke-width="0"/><text x="1070" y="228" font-size="22" fill="#12A697" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">2 · POLICY GENERATOR</text><text x="1070" y="264" font-size="22" fill="#1B262B" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">Builds the Data Identification policy</text><text x="1070" y="304" font-size="21" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Reads the Registry + reconciled ids</text><text x="1070" y="338" font-size="21" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Emits methods = the “policy”:</text><text x="1070" y="372" font-size="21" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">   dictionaries (ZIP) + patterns (JSON)</text><text x="1070" y="406" font-size="21" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Ensures consistent tagging</text><text x="1070" y="440" font-size="21" fill="#1B262B" text-anchor="start" font-weight="400"  font-family="Arial, Helvetica, sans-serif">• Fills coverage gaps · drift check</text><rect x="1070" y="500" width="410" height="58" rx="10" fill="#FFFFFF" stroke="#D8E2E6" stroke-width="2"/><text x="1090" y="536" font-size="20" fill="#14333F" text-anchor="start" font-weight="700"  font-family="Arial, Helvetica, sans-serif">PDC area:  Data Identification</text><text x="1070" y="606" font-size="20" fill="#12A697" text-anchor="start" font-weight="700" font-style="italic" font-family="Arial, Helvetica, sans-serif">Consumes the Registry</text><text x="60" y="720" font-size="21" fill="#5B6B73" text-anchor="start" font-weight="400" font-style="italic" font-family="Arial, Helvetica, sans-serif">A “policy” in PDC is simply the set of dictionary + pattern methods a steward enables — not a separate object.</text><text x="60" y="756" font-size="21" fill="#5B6B73" text-anchor="start" font-weight="400" font-style="italic" font-family="Arial, Helvetica, sans-serif">Two distinct jobs (glossary vs. Data Identification); the Registry is the contract between the two apps.</text></svg>